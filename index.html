<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Keuangan Pribadi</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f0f2f5;
            --primary: #4e73df;
            --success: #1cc88a;
            --danger: #e74a3b;
            --warning: #f6c23e;
            --dark: #5a5c69;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Ringkasan Kartu Atas */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-left: 5px solid;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card.pemasukan { border-left-color: var(--success); }
        .card.pengeluaran { border-left-color: var(--danger); }
        .card.sisa { border-left-color: var(--warning); }

        .card-title {
            font-size: 14px;
            text-transform: uppercase;
            color: var(--dark);
            margin-bottom: 5px;
            font-weight: bold;
        }

        .card-value {
            font-size: 24px;
            font-weight: bold;
        }

        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }
        .text-warning { color: var(--warning); }

        /* Konten Utama */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .main-content { grid-template-columns: 1fr; }
        }

        .section-box {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #2e59d9;
        }

        /* Status Sinkronisasi */
        .status-cloud {
            text-align: center;
            font-size: 13px;
            color: #858796;
            margin-top: 10px;
        }

        /* Grafik */
        .chart-container {
            position: relative;
            margin: auto;
            height: 250px;
            width: 250px;
        }

        /* Tabel Transaksi */
        .table-section {
            grid-column: 1 / -1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: var(--primary);
            color: white;
        }

        tr:nth-child(even) { background-color: #f9f9f9; }

        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            color: white;
        }
        .bg-success { background-color: var(--success); }
        .bg-danger { background-color: var(--danger); }
        
        /* Desain Tombol Aksi Hapus */
        .btn-delete {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 16px;
            padding: 5px 10px;
            transition: transform 0.1s;
        }
        
        .btn-delete:hover {
            transform: scale(1.2);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Laporan Keuangan Interaktif</h2>

    <div class="summary-cards">
        <div class="card pemasukan">
            <div class="card-title">Total Pemasukan</div>
            <div class="card-value text-success" id="txtPemasukan">Rp 0</div>
        </div>
        <div class="card pengeluaran">
            <div class="card-title">Total Pengeluaran</div>
            <div class="card-value text-danger" id="txtPengeluaran">Rp 0</div>
        </div>
        <div class="card sisa">
            <div class="card-title">Sisa Uang (Saldo)</div>
            <div class="card-value text-warning" id="txtSisa">Rp 0</div>
        </div>
    </div>

    <div class="main-content">
        <div class="section-box">
            <h3>Tambah Transaksi Baru</h3>
            <form id="financeForm">
                <div class="form-group">
                    <label>Tanggal Transaksi</label>
                    <input type="date" id="tanggal" required>
                </div>
                <div class="form-group">
                    <label>Keterangan</label>
                    <input type="text" id="keterangan" placeholder="Contoh: Gaji bulanan, Beli kopi" required>
                </div>
                <div class="form-group">
                    <label>Jenis</label>
                    <select id="jenis">
                        <option value="pemasukan">Pemasukan</option>
                        <option value="pengeluaran">Pengeluaran</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Jumlah (Rp)</label>
                    <input type="number" id="jumlah" placeholder="Contoh: 50000" required>
                </div>
                <button type="submit">Simpan ke Cloud</button>
            </form>
            <div class="status-cloud"><i class="fa-solid fa-cloud"></i> Terhubung ke Cloud Firebase Database</div>
        </div>

        <div class="section-box" style="text-align: center;">
            <h3>Visualisasi Alokasi Dana</h3>
            <div class="chart-container">
                <canvas id="financeChart"></canvas>
            </div>
        </div>

        <div class="section-box table-section">
            <h3>Daftar Riwayat Transaksi</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Waktu (Hari, Tanggal)</th>
                            <th>Keterangan</th>
                            <th>Jenis</th>
                            <th>Jumlah</th>
                            <th style="text-align: center;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="transactionTable">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // 1. ISI KONFIGURASI FIREBASE DI BAWAH INI
    // (Tempel data Kunci API asli Anda dari tab "Use a <script> tag" di dalam tanda kurung kurawal ini)
    const firebaseConfig = {
        apiKey: "AIzaSyD-CONTOH-KEY-ANDA",
        authDomain: "daftar-keuangan.firebaseapp.com",
        databaseURL: "https://daftar-keuangan-default-rtdb.firebaseio.com/",
        projectId: "daftar-keuangan",
        storageBucket: "daftar-keuangan.appspot.com",
        messagingSenderId: "1234567890",
        appId: "1:1234:web:abcd"
    };

    // Inisialisasi Firebase & Database
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'transaksi');

    // Atur input tanggal ke hari ini secara otomatis
    document.getElementById('tanggal').valueAsDate = new Date();

    let dataTransaksiGlobal = [];
    let totalPemasukan = 0;
    let totalPengeluaran = 0;
    let sisaUang = 0;

    // Inisialisasi Grafik (Chart.js)
    const ctx = document.getElementById('financeChart').getContext('2d');
    let financeChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Pemasukan', 'Pengeluaran'],
            datasets: [{
                data: [0, 0],
                backgroundColor: ['#1cc88a', '#e74a3b'],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });

    function formatRupiah(angka) {
        return 'Rp ' + angka.toLocaleString('id-ID');
    }

    function formatWaktuLengkap(tanggalInput) {
        const opsi = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const tanggalBaru = new Date(tanggalInput);
        return tanggalBaru.toLocaleDateString('id-ID', opsi);
    }

    // Fungsi Utama untuk Memperbarui Tampilan Halaman
    function renderTampilan(dataObj) {
        dataTransaksiGlobal = [];
        totalPemasukan = 0;
        totalPengeluaran = 0;

        if (dataObj) {
            // Ubah objek Firebase menjadi array lokal untuk diurutkan
            Object.keys(dataObj).forEach(key => {
                dataTransaksiGlobal.push({
                    id: key,
                    ...dataObj[key]
                });
            });

            // Urutkan transaksi berdasarkan tanggal terbaru di atas
            dataTransaksiGlobal.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));

            // Hitung kalkulasi total nominal
            dataTransaksiGlobal.forEach(t => {
                if (t.jenis === 'pemasukan') {
                    totalPemasukan += t.jumlah;
                } else if (t.jenis === 'pengeluaran') {
                    totalPengeluaran += t.jumlah;
                }
            });
        }

        sisaUang = totalPemasukan - totalPengeluaran;

        // Tampilkan kalkulasi nominal di kartu atas
        document.getElementById('txtPemasukan').innerText = formatRupiah(totalPemasukan);
        document.getElementById('txtPengeluaran').innerText = formatRupiah(totalPengeluaran);
        document.getElementById('txtSisa').innerText = formatRupiah(sisaUang);

        // Update visualisasi diagram lingkaran
        financeChart.data.datasets[0].data = [totalPemasukan, totalPengeluaran];
        financeChart.update();

        // Buat struktur tabel riwayat
        const tableBody = document.getElementById('transactionTable');
        tableBody.innerHTML = '';
        
        dataTransaksiGlobal.forEach((t) => {
            const row = document.createElement('tr');
            const badgeClass = t.jenis === 'pemasukan' ? 'bg-success' : 'bg-danger';
            const jenisText = t.jenis === 'pemasukan' ? 'Pemasukan' : 'Pengeluaran';

            row.innerHTML = `
                <td style="font-size: 14px;">${formatWaktuLengkap(t.tanggal)}</td>
                <td>${t.keterangan}</td>
                <td><span class="badge ${badgeClass}">${jenisText}</span></td>
                <td class="${t.jenis === 'pemasukan' ? 'text-success' : 'text-danger'}" style="font-weight:bold;">
                    ${formatRupiah(t.jumlah)}
                </td>
                <td style="text-align: center;">
                    <button class="btn-delete" data-id="${t.id}" title="Hapus Catatan">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </td>
            `;
            tableBody.appendChild(row);
        });

        // Pasangkan fungsi hapus ke setiap tombol ikon sampah
        document.querySelectorAll('.btn-delete').forEach(btn => {
            btn.addEventListener('click', function() {
                const idData = this.getAttribute('data-id');
                hapusTransaksi(idData);
            });
        });
    }

    // Fungsi Sinkronisasi Data Realtime Otomatis saat Ada Perubahan di Server Cloud
    onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        renderTampilan(data);
    });

    // Fungsi Menghapus Catatan di Cloud Database Firebase secara Permanen
    function hapusTransaksi(id) {
        if (confirm("Apakah Anda yakin ingin menghapus catatan keuangan ini dari cloud database?")) {
            const dataSpesifikRef = ref(db, `transaksi/${id}`);
            remove(dataSpesifikRef)
                .then(() => {
                    console.log("Data berhasil terhapus dari cloud.");
                })
                .catch((error) => {
                    alert("Gagal menghapus data: " + error.message);
                });
        }
    }

    // Event saat Form Submit (Simpan Transaksi Langsung ke Firebase Cloud)
    document.getElementById('financeForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const tanggal = document.getElementById('tanggal').value;
        const keterangan = document.getElementById('keterangan').value;
        const jenis = document.getElementById('jenis').value;
        const jumlah = parseInt(document.getElementById('jumlah').value);

        // Kirim data baru ke Firebase Cloud
        push(dbRef, { tanggal, keterangan, jenis, jumlah })
            .then(() => {
                // Reset Form input setelah berhasil terkirim
                document.getElementById('keterangan').value = '';
                document.getElementById('jumlah').value = '';
                document.getElementById('tanggal').valueAsDate = new Date();
            })
            .catch((error) => {
                alert("Gagal menyimpan data ke Cloud: " + error.message);
            });
    });
</script>

</body>
</html>
