<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Keuangan Cloud & Excel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-4 md:p-8">

    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl p-6">
        <div class="flex flex-col md:flex-row md:justify-between md:items-center border-b border-gray-100 pb-4 mb-6 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-blue-900">📊 Aplikasi Daftar Keuangan Pribadi</h1>
                <p class="text-sm text-gray-500 mt-1">Sinkronisasi Cloud Firebase & Lembar Kerja Excel</p>
            </div>
            <button onclick="unduhKeExcelLangsung()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-5 py-2.5 rounded-xl shadow-md transition-all flex items-center gap-2 cursor-pointer text-sm">
                <i class="fa-solid fa-file-excel text-lg"></i> Ambil Laporan Excel (.xlsx)
            </button>
        </div>

        <div class="bg-gray-50 rounded-xl p-4 mb-6 border border-gray-200/60">
            <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-600 mb-3">Tambah Transaksi Baru (Otomatis ke Cloud & Excel)</h2>
            <form id="formKeuangan" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Tanggal Transaksi</label>
                    <input type="date" id="inputTanggal" required class="w-full bg-white border border-gray-300 rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Keterangan / Nama Transaksi</label>
                    <input type="text" id="inputKeterangan" placeholder="Contoh: Gaji Bulanan, Beli Kopi" required class="w-full bg-white border border-gray-300 rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Jenis</label>
                    <select id="inputJenis" class="w-full bg-white border border-gray-300 rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="Pemasukan">🟢 Pemasukan</option>
                        <option value="Pengeluaran">🔴 Pengeluaran</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Jumlah Nominal (Rp)</label>
                    <div class="flex gap-2">
                        <input type="number" id="inputJumlah" placeholder="0" min="1" required class="w-full bg-white border border-gray-300 rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2 rounded-lg text-sm transition-all shadow cursor-pointer whitespace-nowrap">
                            Simpan Data
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <div class="overflow-x-auto rounded-xl border border-gray-200">
            <table class="w-full text-left text-sm border-collapse min-w-[1000px]">
                <thead>
                    <tr class="bg-blue-900 text-white text-xs uppercase tracking-wider font-semibold">
                        <th class="p-3 text-center border-b border-blue-950">Hari</th>
                        <th class="p-3 text-center border-b border-blue-950">Tanggal</th>
                        <th class="p-3 text-center border-b border-blue-950">Bulan</th>
                        <th class="p-3 text-center border-b border-blue-950">Tahun</th>
                        <th class="p-3 border-b border-blue-950">Keterangan</th>
                        <th class="p-3 text-center border-b border-blue-950">Jenis</th>
                        <th class="p-3 text-right border-b border-blue-950">Pemasukan (Rp)</th>
                        <th class="p-3 text-right border-b border-blue-950">Pengeluaran (Rp)</th>
                        <th class="p-3 text-right border-b border-blue-950">Sisa Saldo (Rp)</th>
                        <th class="p-3 text-center border-b border-blue-950" style="width: 60px;">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tabelBody" class="divide-y divide-gray-200">
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ✅ KODE FIREBASE CONFIG ASLI ANDA SUDAH TERSINKRONISASI DI SINI
        const firebaseConfig = {
            apiKey: "AIzaSyA...", 
            authDomain: "daftar-keuangan-default-rtdb.firebaseapp.com",
            databaseURL: "https://daftar-keuangan-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "daftar-keuangan",
            storageBucket: "daftar-keuangan.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const transaksiRef = ref(db, "transaksi");

        const namaHari = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        const namaBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

        window.antreanExcelLangsung = [];

        onValue(transaksiRef, (snapshot) => {
            const tabelBody = document.getElementById("tabelBody");
            tabelBody.innerHTML = ""; 
            window.antreanExcelLangsung = []; 

            if (!snapshot.exists()) {
                tabelBody.innerHTML = `<tr><td colspan="10" class="p-6 text-center text-gray-400 bg-gray-50 italic">Belum ada data keuangan terdeteksi di server cloud.</td></tr>`;
                return;
            }

            let daftarTransaksi = [];
            snapshot.forEach((childSnapshot) => {
                daftarTransaksi.push({
                    id: childSnapshot.key,
                    ...childSnapshot.val()
                });
            });

            daftarTransaksi.sort((a, b) => new Date(a.tanggal) - new Date(b.tanggal));

            let akumulasiSaldo = 0;

            daftarTransaksi.forEach((item) => {
                const dateObj = new Date(item.tanggal);
                const hari = namaHari[dateObj.getDay()] || "-";
                const tanggal = String(dateObj.getDate()).padStart(2, '0');
                const bulan = namaBulan[dateObj.getMonth()] || "-";
                const tahun = dateObj.getFullYear() || "-";

                const nominal = parseInt(item.jumlah) || 0;
                let kolomPemasukan = 0;
                let kolomPengeluaran = 0;

                if (item.jenis === "Pemasukan") {
                    kolomPemasukan = nominal;
                    akumulasiSaldo += nominal;
                } else {
                    kolomPengeluaran = nominal;
                    akumulasiSaldo -= nominal;
                }

                const warnaJenis = item.jenis === "Pemasukan" ? "text-emerald-600 bg-emerald-50" : "text-rose-600 bg-rose-50";

                const rowHtml = `
                    <tr class="hover:bg-gray-50/80 transition-colors">
                        <td class="p-3 text-center text-gray-500 border-r border-gray-100">${hari}</td>
                        <td class="p-3 text-center text-gray-700 border-r border-gray-100 font-mono">${tanggal}</td>
                        <td class="p-3 text-center text-gray-500 border-r border-gray-100">${bulan}</td>
                        <td class="p-3 text-center text-gray-500 border-r border-gray-100 font-mono">${tahun}</td>
                        <td class="p-3 text-gray-800 font-medium border-r border-gray-100">${item.keterangan}</td>
                        <td class="p-3 text-center border-r border-gray-100"><span class="px-2 py-0.5 rounded text-xs font-semibold ${warnaJenis}">${item.jenis}</span></td>
                        <td class="p-3 text-right border-r border-gray-100 text-emerald-700 font-mono font-medium">${kolomPemasukan > 0 ? 'Rp ' + kolomPemasukan.toLocaleString('id-ID') : '-'}</td>
                        <td class="p-3 text-right border-r border-gray-100 text-rose-700 font-mono font-medium">${kolomPengeluaran > 0 ? 'Rp ' + kolomPengeluaran.toLocaleString('id-ID') : '-'}</td>
                        <td class="p-3 text-right font-bold text-blue-900 font-mono">Rp ${akumulasiSaldo.toLocaleString('id-ID')}</td>
                        <td class="p-3 text-center">
                            <button onclick="hapusData('${item.id}')" class="text-gray-400 hover:text-rose-600 transition-colors p-1.5 rounded-lg hover:bg-rose-50 cursor-pointer">
                                <i class="fa-solid fa-trash-can text-sm"></i>
                            </button>
                        </td>
                    </tr>
                `;
                tabelBody.insertAdjacentHTML('beforeend', rowHtml);

                window.antreanExcelLangsung.push({
                    "Hari": hari,
                    "Tanggal": tanggal,
                    "Bulan": bulan,
                    "Tahun": tahun,
                    "Keterangan": item.keterangan,
                    "Jenis": item.jenis,
                    "Pemasukan (Rp)": kolomPemasukan,
                    "Pengeluaran (Rp)": kolomPengeluaran,
                    "Sisa Saldo (Rp)": akumulasiSaldo
                });
            });
        });

        document.getElementById("formKeuangan").addEventListener("submit", (e) => {
            e.preventDefault();
            const tanggal = document.getElementById("inputTanggal").value;
            const keterangan = document.getElementById("inputKeterangan").value;
            const jenis = document.getElementById("inputJenis").value;
            const jumlah = document.getElementById("inputJumlah").value;

            push(transaksiRef, {
                tanggal: tanggal,
                keterangan: keterangan,
                jenis: jenis,
                jumlah: parseInt(jumlah)
            }).then(() => {
                document.getElementById("inputKeterangan").value = "";
                document.getElementById("inputJumlah").value = "";
            });
        });

        window.hapusData = function(id) {
            if (confirm("Hapus catatan transaksi ini dari database cloud?")) {
                const itemRef = ref(db, `transaksi/${id}`);
                remove(itemRef);
            }
        };
    </script>

    <script>
        function unduhKeExcelLangsung() {
            if (!window.antreanExcelLangsung || window.antreanExcelLangsung.length === 0) {
                alert("Tidak ada data transaksi finansial untuk dimasukkan ke Excel.");
                return;
            }
            
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(window.antreanExcelLangsung);
            
            ws['!cols'] = [
                { wch: 10 }, { wch: 10 }, { wch: 12 }, { wch: 8 }, 
                { wch: 28 }, { wch: 14 }, { wch: 18 }, { wch: 18 }, { wch: 22 }
            ];

            XLSX.utils.book_append_sheet(wb, ws, "Daftar Keuangan Cloud");
            const tanggalUnduh = new Date().toISOString().split('T')[0];
            XLSX.writeFile(wb, `Daftar_Keuangan_Langsung_Excel_${tanggalUnduh}.xlsx`);
        }
    </script>
</body>
</html>
