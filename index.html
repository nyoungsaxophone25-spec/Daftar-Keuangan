<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Keuangan & Dashboard Grafik Interaktif</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-3 md:p-6">

    <div class="max-w-7xl mx-auto space-y-6">
        <header class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row md:justify-between md:items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-blue-900 flex items-center gap-2">📊 Aplikasi Daftar Keuangan & Dashboard</h1>
                <p class="text-sm text-gray-500 mt-1">Sinkronisasi Cloud Realtime & Visualisasi Grafik</p>
            </div>
            <button onclick="unduhKeExcelLangsung()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-5 py-2.5 rounded-xl shadow-md transition-all flex items-center gap-2 cursor-pointer text-sm">
                <i class="fa-solid fa-file-excel text-lg"></i> Ambil Laporan Excel
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                <h3 class="text-sm font-semibold text-gray-600 uppercase tracking-wider flex items-center gap-2"><i class="fa-solid fa-chart-pie text-emerald-500"></i> Proporsi Dana</h3>
                <div class="h-56"><canvas id="chartProporsi"></canvas></div>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                <h3 class="text-sm font-semibold text-gray-600 uppercase tracking-wider flex items-center gap-2"><i class="fa-solid fa-chart-column text-blue-500"></i> Nominal Transaksi</h3>
                <div class="h-56"><canvas id="chartBatang"></canvas></div>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between">
                <div>
                    <h3 class="text-sm font-semibold text-gray-600 uppercase tracking-wider mb-2 flex items-center gap-2"><i class="fa-solid fa-file-contract text-blue-800"></i> Ringkasan Saldo</h3>
                    <div class="grid grid-cols-2 gap-3 text-sm">
                        <p class="text-gray-500">Total Pemasukan</p><p id="txtTotalMasuk" class="text-emerald-700 font-bold text-right font-mono">-</p>
                        <p class="text-gray-500">Total Pengeluaran</p><p id="txtTotalKeluar" class="text-rose-700 font-bold text-right font-mono">-</p>
                        <p class="text-blue-900 font-semibold pt-1 border-t border-gray-100">Saldo Akhir Anda</p><p id="txtTotalSaldo" class="text-blue-950 font-extrabold text-right font-mono pt-1 border-t border-gray-100 text-base">-</p>
                    </div>
                </div>
                <div class="h-20 mt-4 border-t border-gray-100 pt-3"><canvas id="chartTrenSaldo"></canvas></div>
            </div>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
            <form id="formKeuangan" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 items-end">
                <div><label class="block text-xs font-medium text-gray-600 mb-1">Tanggal</label><input type="date" id="inputTanggal" required class="w-full bg-white border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none"></div>
                <div><label class="block text-xs font-medium text-gray-600 mb-1">Keterangan</label><input type="text" id="inputKeterangan" required class="w-full bg-white border border-gray-300 rounded-lg p-2.5 text-sm"></div>
                <div><label class="block text-xs font-medium text-gray-600 mb-1">Jenis</label><select id="inputJenis" class="w-full bg-white border border-gray-300 rounded-lg p-2.5 text-sm"><option value="Pemasukan">🟢 Pemasukan</option><option value="Pengeluaran">🔴 Pengeluaran</option></select></div>
                <div><label class="block text-xs font-medium text-gray-600 mb-1">Nominal (Rp)</label><div class="flex gap-2"><input type="number" id="inputJumlah" required class="w-full bg-white border border-gray-300 rounded-lg p-2.5 text-sm"><button type="submit" class="bg-blue-600 text-white px-5 py-2.5 rounded-lg text-sm">Simpan</button></div></div>
            </form>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
            <div class="overflow-x-auto rounded-xl border border-gray-200">
                <table class="w-full text-left text-sm border-collapse min-w-[1000px]">
                    <thead>
                        <tr class="bg-blue-950 text-white text-xs uppercase tracking-wider font-semibold">
                            <th class="p-4 text-center">Hari</th><th class="p-4 text-center">Tanggal</th><th class="p-4">Keterangan</th><th class="p-4 text-center">Jenis</th><th class="p-4 text-right">Masuk</th><th class="p-4 text-right">Keluar</th><th class="p-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelBody" class="divide-y divide-gray-100 text-gray-700"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ⚠️ MASUKKAN DATA CONFIG FIREBASE ASLI ANDA DI SINI
        const firebaseConfig = {
            apiKey: "AIzaSyA...", 
            authDomain: "daftar-keuangan-default-rtdb.firebaseapp.com",
            databaseURL: "https://daftar-keuangan-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "daftar-keuangan",
            storageBucket: "daftar-keuangan.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const transaksiRef = ref(db, "transaksi");
        const namaHariArr = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        window.antreanExcelLangsung = [];
        let dataGlobalGrafik = { masuk: 0, keluar: 0, riwayatSaldo: [], labelWaktu: [] };

        onValue(transaksiRef, (snapshot) => {
            const tabelBody = document.getElementById("tabelBody");
            tabelBody.innerHTML = ""; window.antreanExcelLangsung = [];
            dataGlobalGrafik = { masuk: 0, keluar: 0, riwayatSaldo: [], labelWaktu: [] };

            if (!snapshot.exists()) { updateTampilanVisual(); return; }
            let daftarTransaksi = [];
            snapshot.forEach((childSnapshot) => { daftarTransaksi.push({ id: childSnapshot.key, ...childSnapshot.val() }); });
            daftarTransaksi.sort((a, b) => new Date(a.tanggal) - new Date(b.tanggal));
            let akumulasiSaldo = 0;

            daftarTransaksi.forEach((item) => {
                const dateObj = new Date(item.tanggal);
                const hari = namaHariArr[dateObj.getDay()] || "-";
                const tanggalText = String(dateObj.getDate()).padStart(2, '0') + '/' + String(dateObj.
